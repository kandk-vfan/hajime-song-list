<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>🦊💙🎵 hajime Songs</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="dark">
<h1>🦊💙🎵 hajime Song List</h1>

<div class="tabs">
  <button id="tabSongs" class="tab-button active" onclick="showTab('songs')">曲一覧</button>
  <button id="tabStreams" class="tab-button" onclick="showTab('streams')">配信一覧</button>
  <button id="tabArtists" class="tab-button" onclick="showTab('artists')">アーティスト</button>
</div>

<div class="toolbar">
  <input id="searchInput" placeholder="">
  <select id="sortSelect"></select>
</div>

<div id="songs" class="section">
  <table>
    <thead>
      <tr>
        <th>曲名</th>
        <th>アーティスト</th>
        <th>回数</th>
        <th>再生（最新配信）</th>
      </tr>
    </thead>
    <tbody id="songsBody"></tbody>
  </table>
</div>

<div id="streams" class="hidden section">
  <div id="streamsContainer"></div>
</div>

<div id="artists" class="hidden section">
  <table>
    <thead>
      <tr>
        <th>アーティスト</th>
        <th>曲</th>
        <th>回数</th>
      </tr>
    </thead>
    <tbody id="artistsBody"></tbody>
  </table>
</div>

<div id="modal" class="hidden">
  <div class="modal-content">
    <div id="player"></div>
    <div class="modal-actions">
      <button onclick="closeModal()">閉じる</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
