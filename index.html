<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>🦊💙 hajime Songs 🍺🦊</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="dark">

<h1>🦊💙 hajime Song List 🍺🦊</h1>

<div class="controls">
  <button onclick="showTab('songs')">曲一覧</button>
  <button onclick="showTab('streams')">配信一覧</button>
  <button onclick="showTab('artists')">アーティスト</button>

  <input id="search" placeholder="検索">
</div>

<!-- 曲一覧 -->
<div id="songs">
<select id="sortSongs"></select>
<table>
<thead>
<tr>
<th>曲名</th>
<th>アーティスト</th>
<th>回数</th>
<th>再生</th>
</tr>
</thead>
<tbody id="songsBody"></tbody>
</table>
</div>

<!-- 配信一覧 -->
<div id="streams" class="hidden">
<select id="sortStreams"></select>
<div id="streamsContainer"></div>
</div>

<!-- アーティスト -->
<div id="artists" class="hidden">
<select id="sortArtists"></select>
<table>
<thead>
<tr>
<th>アーティスト</th>
<th>曲</th>
<th>回数</th>
</tr>
</thead>
<tbody id="artistsBody"></tbody>
</table>
</div>

<div id="modal" class="hidden">
<div id="player"></div>
<button onclick="closeModal()">閉じる</button>
</div>

<script src="app.js"></script>
</body>
</html>
